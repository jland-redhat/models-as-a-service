apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# params.env + maas-parameters generator: same path the Open Data Hub operator uses
# (maas/base/maas-controller/default) so RELATED_IMAGE ApplyParams mutates this file.
# Overlays must not declare a second maas-parameters generator.
configMapGenerator:
  - envs:
      - params.env
    name: maas-parameters
generatorOptions:
  disableNameSuffixHash: true

resources:
  - ../crd
  - ../rbac
  - ../manager
  - ../monitoring
  # Gateway policies (gateway-default-auth, gateway-default-deny) are applied
  # separately by deploy.sh so they stay in openshift-ingress; see deploy_via_kustomize.
