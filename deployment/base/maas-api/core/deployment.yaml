apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-api
spec:
  replicas: 1
  template:
    spec:
      serviceAccountName: maas-api
      securityContext:
        runAsNonRoot: true
      containers:
      - name: maas-api
        image: quay.io/isequeir/maas-api:api-key-20260301-232339
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SECURE
          value: "false"
        - name: DB_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: maas-db-config
              key: DB_CONNECTION_URL
        # PREREQUISITE: Secret 'maas-db-config' must exist before deployment.
        # Create the secret with your PostgreSQL connection URL:
        #
        #   kubectl create secret generic maas-db-config \
        #     -n <namespace> \
        #     --from-literal=DB_CONNECTION_URL='postgresql://user:password@host:port/database?sslmode=disable'
        #
        # Database options:
        #   - AWS RDS PostgreSQL
        #   - Azure Database for PostgreSQL
        #   - Crunchy PostgreSQL Operator
        #   - Self-managed PostgreSQL cluster
        #
        # Note: scripts/deploy.sh creates this secret automatically for development.
        # For production ODH/RHOAI deployments, create it before enabling modelsAsService.
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      terminationGracePeriodSeconds: 30
